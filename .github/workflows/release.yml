name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build frontend assets (needed for go:embed)
        run: |
          npm ci
          npx tailwindcss@3.4.17 -i web/src/css/app.css -o web/static/css/app.css --minify
          npx esbuild web/src/js/app.jsx --bundle --minify --outfile=web/static/js/app.js --jsx=automatic --jsx-import-source=preact

      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'

      - name: Build release binaries (assets embedded via go:embed)
        run: |
          VERSION=${GITHUB_REF_NAME}
          BUILD_TIME=$(date -u '+%Y-%m-%d_%H:%M:%S')
          LDFLAGS="-s -w -X main.Version=${VERSION} -X main.BuildTime=${BUILD_TIME}"

          platforms=("linux/amd64" "linux/arm64" "darwin/amd64" "darwin/arm64")

          mkdir -p dist

          for platform in "${platforms[@]}"; do
            IFS='/' read -r GOOS GOARCH <<< "$platform"

            SERVER_NAME="linkstash-server-${GOOS}-${GOARCH}"
            CLI_NAME="linkstash-${GOOS}-${GOARCH}"

            echo "Building ${SERVER_NAME}..."
            CGO_ENABLED=0 GOOS=$GOOS GOARCH=$GOARCH go build -ldflags="$LDFLAGS" -o "dist/${SERVER_NAME}" ./cmd/server/

            echo "Building ${CLI_NAME}..."
            CGO_ENABLED=0 GOOS=$GOOS GOARCH=$GOARCH go build -ldflags="$LDFLAGS" -o "dist/${CLI_NAME}" ./cmd/cli/
          done

          ls -lh dist/

      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > checksums.txt
          cat checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*
