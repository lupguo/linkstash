name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'

      - name: Build release binaries
        run: |
          VERSION=${GITHUB_REF_NAME}
          LDFLAGS="-s -w -X main.Version=${VERSION}"

          platforms=("linux/amd64" "linux/arm64" "darwin/amd64" "darwin/arm64")

          mkdir -p dist

          for platform in "${platforms[@]}"; do
            IFS='/' read -r GOOS GOARCH <<< "$platform"

            SERVER_NAME="linkstash-server-${GOOS}-${GOARCH}"
            CLI_NAME="linkstash-${GOOS}-${GOARCH}"

            echo "Building ${SERVER_NAME}..."
            CGO_ENABLED=0 GOOS=$GOOS GOARCH=$GOARCH go build -ldflags="$LDFLAGS" -o "dist/${SERVER_NAME}" ./cmd/server/

            echo "Building ${CLI_NAME}..."
            CGO_ENABLED=0 GOOS=$GOOS GOARCH=$GOARCH go build -ldflags="$LDFLAGS" -o "dist/${CLI_NAME}" ./cmd/cli/
          done

          ls -lh dist/

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build frontend and package web resources
        run: |
          npm install -g esbuild @tailwindcss/cli

          mkdir -p web/static/css web/static/js
          tailwindcss -i web/src/css/app.css -o web/static/css/app.css --minify
          esbuild web/src/js/app.js --bundle --minify --outfile=web/static/js/app.js

          tar -czf dist/web.tar.gz -C web templates components static

      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > checksums.txt
          cat checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            dist/*
