server:
  host: 0.0.0.0
  port: 8080

auth:
  secret_key: "passwd"
  jwt_secret: "${JWT_SECRET}"
  jwt_expire_hours: 72

database:
  driver: sqlite            # sqlite | mysql
  sqlite:
    path: "./data/linkstash.db"
  mysql:
    user: "${MYSQL_USER:root}"
    password: "${MYSQL_PASSWORD}"
    host: "${MYSQL_HOST:127.0.0.1}"
    port: ${MYSQL_PORT:3306}
    dbname: "${MYSQL_DBNAME:linkstash_db}"
    charset: utf8mb4
    max_open_conns: 25
    max_idle_conns: 5

log:
  level: "debug"
  file: "./logs/app.log"
  format: "text"

short:
  ttl_options:
    - label: "永久"
      value: ""
    - label: "1 天"
      value: "1d"
    - label: "7 天"
      value: "7d"
    - label: "30 天"
      value: "30d"
    - label: "90 天"
      value: "90d"
    - label: "1 年"
      value: "365d"

llm:
  chat:
    provider: "openrouter"
    endpoint: "https://openrouter.ai/api/v1/chat/completions"
    api_key: "${OPENROUTER_API_KEY}"
    model: "minimax/minimax-m2.5"
  embedding:
    provider: "openrouter"
    endpoint: "https://openrouter.ai/api/v1/embeddings"
    api_key: "${OPENROUTER_API_KEY}"
    model: "qwen/qwen3-embedding-8b"
    dimensions: 512
  prompts:
    url_analysis: |
      分析以下网页内容，返回JSON格式：
      {"title":"标题","keywords":"关键词1,关键词2","description":"50字内摘要","category":"分类","tags":"标签1,标签2","network_type":"网络类型"}
      category必须从以下选项中选择：技术、设计、产品、商业、科学、生活、工具、资讯、其他
      network_type根据URL域名和页面内容判断网络访问环境，从以下选项中选择：internal(企业内部/内网站点,如内网IP、企业私有域名), domestic(中国国内站点), overseas(海外站点), unknown(无法确定)
      tags基于内容自由生成，用逗号分隔，2-5个标签。
      仅返回JSON，不要其他内容。
    url_categorize: |
      根据以下URL和标题，判断最合适的分类（建议从以下选项中选择，也可自定义）：
      技术、设计、产品、商业、科学、生活、工具、资讯、其他

categories:
  - "技术"
  - "设计"
  - "产品"
  - "商业"
  - "科学"
  - "生活"
  - "工具"
  - "资讯"
  - "其他"

network_types:
  - key: internal
    label: 内网
  - key: domestic
    label: 国内
  - key: overseas
    label: 海外
  - key: unknown
    label: 未知

# proxy:
#   http_proxy: "http://127.0.0.1:8118"       # HTTP/HTTPS proxy
#   http_proxy: "socks5h://127.0.0.1:1080"    # SOCKS5 proxy (with remote DNS)

fetcher:
  strategies: ["http"]
  http:
    timeout_sec: 15
    max_content: 51200
    user_agent: "LinkStash/1.0 (+https://github.com/lupguo/linkstash)"
  browser:
    timeout_sec: 30
    max_content: 51200
    lifecycle: "on-demand"

browser:
  enabled: true
  # bin_path: "/usr/bin/chromium-browser"  # 留空自动下载
  headless: true
  timeout_sec: 30
