server:
  host: 0.0.0.0
  port: 8080

auth:
  secret_key: "clark"
  jwt_secret: "linkstash-jwt-secret-key-change-in-production"
  jwt_expire_hours: 72

database:
  path: "./data/linkstash.db"

short:
  ttl_options:
    - label: "永久"
      value: ""
    - label: "1 天"
      value: "1d"
    - label: "7 天"
      value: "7d"
    - label: "30 天"
      value: "30d"
    - label: "90 天"
      value: "90d"
    - label: "1 年"
      value: "365d"

llm:
  chat:
    provider: "openrouter"
    endpoint: "https://openrouter.ai/api/v1/chat/completions"
    api_key: "${OPENROUTER_API_KEY}"
    model: "minimax/minimax-m2.5"
  embedding:
    provider: "openrouter"
    endpoint: "https://openrouter.ai/api/v1/embeddings"
    api_key: "${OPENROUTER_API_KEY}"
    model: "qwen/qwen3-embedding-8b"
    dimensions: 512
  prompts:
    url_analysis: |
      分析以下网页内容，返回JSON格式：
      {"title":"标题","keywords":"关键词1,关键词2","description":"50字内摘要","category":"分类","tags":"标签1,标签2"}
      仅返回JSON，不要其他内容。
    url_categorize: |
      根据以下URL和标题，判断最合适的分类（建议从以下选项中选择，也可自定义）：
      技术、设计、产品、商业、科学、生活、工具、资讯、其他

categories:
  - "技术"
  - "设计"
  - "产品"
  - "商业"
  - "科学"
  - "生活"
  - "工具"
  - "资讯"
  - "其他"

# proxy:
#   http_proxy: "http://127.0.0.1:8118"       # HTTP/HTTPS proxy
#   http_proxy: "socks5h://127.0.0.1:1080"    # SOCKS5 proxy (with remote DNS)
