{{define "content"}}
<div class="flex items-center justify-center min-h-[70vh]">
    <div class="w-full max-w-md" x-data="loginForm()">
        <!-- Header -->
        <div class="mb-8">
            <h1 class="text-2xl font-bold">
                <span class="text-terminal-gray">$</span> authenticate
            </h1>
            <p class="text-terminal-gray text-sm mt-2">// enter your secret key to access the system</p>
        </div>

        <!-- Login Form -->
        <div class="terminal-card p-6 rounded-lg">
            <!-- Error Message -->
            <div x-show="error" x-cloak
                 class="mb-4 p-3 border border-terminal-red bg-terminal-red/10 rounded text-terminal-red text-sm">
                <span class="text-terminal-red">ERROR:</span> <span x-text="error"></span>
            </div>

            <!-- Success Message -->
            <div x-show="success" x-cloak
                 class="mb-4 p-3 border border-terminal-green bg-terminal-green/10 rounded text-sm">
                <span>OK:</span> authenticated. redirecting...
            </div>

            <form @submit.prevent="submit()">
                <!-- Secret Key Input -->
                <div class="mb-6">
                    <label class="block text-sm mb-2 text-terminal-gray">
                        <span class="text-terminal-green">&gt;</span> secret_key:
                    </label>
                    <input type="password"
                           x-model="secretKey"
                           placeholder="enter-secret-key"
                           class="terminal-input w-full px-4 py-3 rounded font-mono text-sm"
                           :disabled="loading"
                           autofocus>
                </div>

                <!-- Submit Button -->
                <button type="submit"
                        class="terminal-btn w-full py-3 rounded font-mono text-sm font-bold tracking-wider"
                        :disabled="loading"
                        :class="{ 'opacity-50 cursor-not-allowed': loading }">
                    <span x-show="!loading">&gt; AUTHENTICATE</span>
                    <span x-show="loading">processing...</span>
                </button>
            </form>

            <!-- Terminal decoration -->
            <div class="mt-6 text-xs text-terminal-gray">
                <p>$ connection: encrypted</p>
                <p>$ protocol: JWT/HMAC-SHA256</p>
            </div>
        </div>
    </div>
</div>
{{end}}
