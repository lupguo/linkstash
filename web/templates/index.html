{{define "content"}}
<div x-data="urlListPage()" x-init="initScroll()" @keyup.escape.window="if (isSearch || searchQuery) clearSearch()">
    <!-- Header -->
    <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between mb-4 gap-3">
        <div>
            <h1 class="text-xl font-bold">
                <span class="text-terminal-gray">$</span> ls -la /urls
            </h1>
            <p class="text-terminal-gray text-xs mt-1">
                // total: <span class="text-terminal-green">{{.Total}}</span> records
            </p>
        </div>
        <a href="/urls/new" class="terminal-btn px-4 py-2 rounded text-sm text-center">
            &gt; touch
        </a>
    </div>

    <!-- Search & Filters — merged glass panel -->
    <div class="glass-panel p-3 rounded-lg mb-4 space-y-2">
        <form @submit.prevent="doSearch()" class="flex flex-col gap-2">
            <div class="flex gap-2">
                <input type="text" x-model="searchQuery"
                       placeholder="search bookmarks..."
                       class="terminal-input flex-1 px-3 py-2 rounded text-sm">
                <button type="submit" class="terminal-btn px-4 py-2 rounded text-sm whitespace-nowrap">
                    &gt; grep
                </button>
                <button type="button" @click="clearSearch()" x-show="searchQuery || isSearch"
                        class="terminal-btn terminal-btn-danger px-3 py-2 rounded text-sm whitespace-nowrap">
                    x
                </button>
            </div>
            <!-- Search Type Buttons -->
            <div class="flex items-center gap-2">
                <span class="text-terminal-gray text-xs">mode:</span>
                <button type="button" @click="searchType = 'keyword'"
                        class="px-3 py-1 rounded text-xs border transition-all"
                        :class="searchType === 'keyword' ? 'border-terminal-green bg-terminal-green/10 text-terminal-green' : 'border-terminal-border text-terminal-gray hover:text-terminal-green'">
                    keyword
                </button>
                <button type="button" @click="searchType = 'semantic'"
                        class="px-3 py-1 rounded text-xs border transition-all"
                        :class="searchType === 'semantic' ? 'border-terminal-green bg-terminal-green/10 text-terminal-green' : 'border-terminal-border text-terminal-gray hover:text-terminal-green'">
                    semantic
                </button>
                <button type="button" @click="searchType = 'hybrid'"
                        class="px-3 py-1 rounded text-xs border transition-all"
                        :class="searchType === 'hybrid' ? 'border-terminal-green bg-terminal-green/10 text-terminal-green' : 'border-terminal-border text-terminal-gray hover:text-terminal-green'">
                    hybrid
                </button>
            </div>
        </form>

        <!-- Filters -->
        <div class="flex flex-wrap gap-3 items-center text-sm pt-2 border-t border-terminal-border/50">
            <div class="flex items-center gap-2">
                <span class="text-terminal-gray text-xs">category:</span>
                <select x-model="filters.category" @change="applyFilters()"
                        class="terminal-input px-2 py-1 rounded text-xs">
                    <option value="">all</option>
                    {{range .Categories}}
                    <option value="{{.}}">{{.}}</option>
                    {{end}}
                </select>
            </div>
            <div class="flex items-center gap-2">
                <span class="text-terminal-gray text-xs">sort:</span>
                <select x-model="filters.sort" @change="applyFilters()"
                        class="terminal-input px-2 py-1 rounded text-xs">
                    <option value="weight">weight</option>
                    <option value="time">time</option>
                </select>
            </div>
            <div class="flex items-center gap-2">
                <span class="text-terminal-gray text-xs">size:</span>
                <select x-model="filters.size" @change="applyFilters()"
                        class="terminal-input px-2 py-1 rounded text-xs">
                    <option value="20">20</option>
                    <option value="50">50</option>
                    <option value="100">100</option>
                </select>
            </div>
            <label class="flex items-center gap-1 cursor-pointer">
                <input type="checkbox" x-model="filters.isShortURL" @change="applyFilters()"
                       class="accent-green-500">
                <span class="text-terminal-gray text-xs">short only</span>
            </label>
            <div class="flex items-center gap-2" x-show="isSearch" x-cloak>
                <span class="text-terminal-gray text-xs">score:</span>
                <select x-model="filters.minScore" @change="applyFilters()"
                        class="terminal-input px-2 py-1 rounded text-xs">
                    <option value="0">all</option>
                    <option value="0.2">≥ 0.2</option>
                    <option value="0.4">≥ 0.4</option>
                    <option value="0.6">≥ 0.6</option>
                    <option value="0.8">≥ 0.8</option>
                    <option value="1.0">= 1.0</option>
                </select>
            </div>
        </div>
    </div>

    <!-- URL List (Grid) -->
    <div id="url-list" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 2xl:grid-cols-4 gap-3 items-start">
        {{range .URLs}}
        {{template "url_card" .}}
        {{end}}
    </div>

    {{if not .URLs}}
    <div class="terminal-card p-8 rounded-lg text-center">
        <p class="text-terminal-gray">// no urls found</p>
        <p class="text-terminal-gray text-xs mt-2">try adding a url or adjusting filters</p>
    </div>
    {{end}}

    <!-- Sentinel: IntersectionObserver target -->
    <div x-ref="sentinel" x-show="hasMore" class="h-4"></div>

    <!-- Loading indicator -->
    <div x-show="isLoading" class="text-center py-4">
        <span class="text-terminal-gray text-sm">loading...</span>
    </div>

    <!-- End of list -->
    <div x-show="!hasMore && !isLoading" x-cloak class="text-center py-4">
        <span class="text-terminal-gray text-xs">// end of list</span>
    </div>
</div>

<!-- Page Data (JSON) — consumed by urlListPage() -->
<script id="page-data" type="application/json">{{json .PageData}}</script>
{{end}}
