{{define "content"}}
<div x-data="urlListPage()">
    <!-- Header -->
    <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between mb-6 gap-4">
        <div>
            <h1 class="text-xl font-bold">
                <span class="text-terminal-gray">$</span> ls -la /urls
            </h1>
            <p class="text-terminal-gray text-xs mt-1">
                // total: <span class="text-terminal-green">{{.Total}}</span> records
            </p>
        </div>
        <button @click="showAddForm = !showAddForm"
                class="terminal-btn px-4 py-2 rounded text-sm">
            <span x-show="!showAddForm">> add_url</span>
            <span x-show="showAddForm">> cancel</span>
        </button>
    </div>

    <!-- Add URL Form -->
    <div x-show="showAddForm" x-cloak class="terminal-card p-4 rounded mb-6">
        <form @submit.prevent="addURL()">
            <div class="flex flex-col sm:flex-row gap-3">
                <div class="flex-1">
                    <label class="block text-xs text-terminal-gray mb-1">> url:</label>
                    <input type="url" x-model="newURL"
                           placeholder="https://example.com"
                           class="terminal-input w-full px-3 py-2 rounded text-sm"
                           required>
                </div>
                <div class="flex items-end">
                    <button type="submit" class="terminal-btn px-4 py-2 rounded text-sm whitespace-nowrap"
                            :disabled="addLoading">
                        <span x-show="!addLoading">> submit</span>
                        <span x-show="addLoading">saving...</span>
                    </button>
                </div>
            </div>
            <div x-show="addError" class="mt-2 text-terminal-red text-xs" x-text="addError"></div>
            <div x-show="addSuccess" class="mt-2 text-terminal-green text-xs">URL added successfully. Refreshing...</div>
        </form>
    </div>

    <!-- Filters -->
    <div class="terminal-card p-3 rounded mb-6">
        <div class="flex flex-wrap gap-3 items-center text-sm">
            <div class="flex items-center gap-2">
                <span class="text-terminal-gray text-xs">category:</span>
                <select x-model="filters.category" @change="applyFilters()"
                        class="terminal-input px-2 py-1 rounded text-xs">
                    <option value="">all</option>
                    {{range .Categories}}
                    <option value="{{.}}">{{.}}</option>
                    {{end}}
                </select>
            </div>
            <div class="flex items-center gap-2">
                <span class="text-terminal-gray text-xs">sort:</span>
                <select x-model="filters.sort" @change="applyFilters()"
                        class="terminal-input px-2 py-1 rounded text-xs">
                    <option value="time">time</option>
                    <option value="weight">weight</option>
                </select>
            </div>
            <div class="flex items-center gap-2">
                <span class="text-terminal-gray text-xs">size:</span>
                <select x-model="filters.size" @change="applyFilters()"
                        class="terminal-input px-2 py-1 rounded text-xs">
                    <option value="20">20</option>
                    <option value="50">50</option>
                    <option value="100">100</option>
                </select>
            </div>
        </div>
    </div>

    <!-- URL List -->
    <div id="url-list" class="space-y-3">
        {{range .URLs}}
        {{template "url_card" .}}
        {{end}}

        {{if not .URLs}}
        <div class="terminal-card p-8 rounded text-center">
            <p class="text-terminal-gray">// no urls found</p>
            <p class="text-terminal-gray text-xs mt-2">try adding a url or adjusting filters</p>
        </div>
        {{end}}
    </div>

    <!-- Pagination -->
    {{template "pagination" .}}
</div>

<script>
function urlListPage() {
    return {
        showAddForm: false,
        newURL: '',
        addLoading: false,
        addError: '',
        addSuccess: false,
        filters: {
            category: '{{.FilterCategory}}',
            sort: '{{.FilterSort}}',
            size: '{{.Size}}',
        },
        applyFilters() {
            const params = new URLSearchParams();
            if (this.filters.category) params.set('category', this.filters.category);
            if (this.filters.sort) params.set('sort', this.filters.sort);
            if (this.filters.size) params.set('size', this.filters.size);
            params.set('page', '1');
            window.location.href = '/?' + params.toString();
        },
        async addURL() {
            this.addError = '';
            this.addSuccess = false;
            this.addLoading = true;
            try {
                const token = getCookie('linkstash_token');
                const resp = await fetch('/api/urls', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + token,
                    },
                    body: JSON.stringify({ link: this.newURL }),
                });
                if (!resp.ok) {
                    const data = await resp.json();
                    this.addError = (data.error && data.error.message) || 'failed to add url';
                    this.addLoading = false;
                    return;
                }
                this.addSuccess = true;
                this.newURL = '';
                setTimeout(() => window.location.reload(), 500);
            } catch (e) {
                this.addError = 'network error';
            }
            this.addLoading = false;
        },
    };
}

function getCookie(name) {
    const v = document.cookie.match('(^|;)\\s*' + name + '\\s*=\\s*([^;]+)');
    return v ? v.pop() : '';
}
</script>
{{end}}
