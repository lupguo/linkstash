{{define "content"}}
<div x-data="searchPage()">
    <!-- Header -->
    <h1 class="text-xl font-bold mb-6">
        <span class="text-terminal-gray">$</span> grep -r
    </h1>

    <!-- Search Input -->
    <div class="mb-4">
        <div class="flex gap-3">
            <input type="text"
                   x-model="query"
                   @keydown.enter="doSearch(1)"
                   placeholder="enter search query..."
                   class="terminal-input flex-1 px-4 py-3 rounded text-sm"
                   autofocus>
            <button @click="doSearch(1)" class="terminal-btn px-6 py-3 rounded text-sm whitespace-nowrap"
                    :disabled="loading">
                <span x-show="!loading">> search</span>
                <span x-show="loading">searching...</span>
            </button>
        </div>
    </div>

    <!-- Search Type Tabs -->
    <div class="flex gap-1 mb-6">
        <button @click="searchType = 'keyword'; doSearch(1)"
                class="px-4 py-2 rounded text-xs border transition-all"
                :class="searchType === 'keyword' ? 'border-terminal-green bg-terminal-green/10 text-terminal-green' : 'border-terminal-border text-terminal-gray hover:text-terminal-green'">
            keyword
        </button>
        <button @click="searchType = 'semantic'; doSearch(1)"
                class="px-4 py-2 rounded text-xs border transition-all"
                :class="searchType === 'semantic' ? 'border-terminal-green bg-terminal-green/10 text-terminal-green' : 'border-terminal-border text-terminal-gray hover:text-terminal-green'">
            semantic
        </button>
        <button @click="searchType = 'hybrid'; doSearch(1)"
                class="px-4 py-2 rounded text-xs border transition-all"
                :class="searchType === 'hybrid' ? 'border-terminal-green bg-terminal-green/10 text-terminal-green' : 'border-terminal-border text-terminal-gray hover:text-terminal-green'">
            hybrid
        </button>
    </div>

    <!-- Results -->
    <div x-show="searched">
        <!-- Result Count -->
        <p class="text-xs text-terminal-gray mb-4">
            // found <span class="text-terminal-green" x-text="total"></span> results
            <span x-show="total > 0">
                (page <span x-text="page"></span> of <span x-text="Math.ceil(total / size)"></span>)
            </span>
        </p>

        <!-- Result List -->
        <div class="space-y-3">
            <template x-for="item in results" :key="item.url.ID">
                <a :href="'/urls/' + item.url.ID"
                   class="terminal-card rounded p-4 block hover:border-terminal-green transition-colors">
                    <div class="flex items-start justify-between gap-3">
                        <div class="flex-1 min-w-0">
                            <!-- Title -->
                            <h3 class="text-sm font-semibold truncate"
                                x-text="item.url.title || item.url.link"></h3>
                            <!-- Description -->
                            <p class="text-xs text-terminal-gray mt-1 line-clamp-2"
                               x-text="item.url.description || '-- no description --'"></p>
                            <!-- Meta -->
                            <div class="flex items-center gap-3 mt-2 text-xs">
                                <span x-show="item.url.category"
                                      class="px-2 py-0.5 border border-terminal-cyan text-terminal-cyan rounded"
                                      x-text="item.url.category"></span>
                                <span class="text-terminal-gray" x-text="'visits: ' + item.url.visit_count"></span>
                            </div>
                        </div>
                        <!-- Score Badge -->
                        <div class="flex-shrink-0">
                            <span class="px-2 py-1 border border-terminal-green text-terminal-green text-xs rounded font-bold"
                                  x-text="'score: ' + item.score.toFixed(3)"></span>
                        </div>
                    </div>
                </a>
            </template>
        </div>

        <!-- No Results -->
        <div x-show="searched && results.length === 0 && !loading"
             class="terminal-card p-8 rounded text-center">
            <p class="text-terminal-gray">// no results found</p>
            <p class="text-terminal-gray text-xs mt-2">try different keywords or search type</p>
        </div>

        <!-- Pagination -->
        <div x-show="total > size" class="mt-6 flex items-center justify-center gap-4 text-sm">
            <button @click="doSearch(page - 1)" :disabled="page <= 1"
                    class="terminal-btn px-3 py-1 rounded text-xs"
                    :class="{ 'opacity-30 cursor-not-allowed': page <= 1 }">
                &lt; prev
            </button>
            <span class="text-terminal-gray text-xs">
                page <span x-text="page"></span> / <span x-text="Math.ceil(total / size)"></span>
            </span>
            <button @click="doSearch(page + 1)" :disabled="page >= Math.ceil(total / size)"
                    class="terminal-btn px-3 py-1 rounded text-xs"
                    :class="{ 'opacity-30 cursor-not-allowed': page >= Math.ceil(total / size) }">
                next &gt;
            </button>
        </div>
    </div>

    <!-- Initial State -->
    <div x-show="!searched && !loading" class="terminal-card p-8 rounded text-center">
        <p class="text-terminal-gray">// enter a query to search your bookmarks</p>
        <p class="text-terminal-gray text-xs mt-2">supports keyword, semantic, and hybrid search modes</p>
    </div>
</div>

<script>
function searchPage() {
    return {
        query: '',
        searchType: 'hybrid',
        results: [],
        total: 0,
        page: 1,
        size: 20,
        loading: false,
        searched: false,
        async doSearch(p) {
            if (!this.query.trim()) return;
            this.page = p || 1;
            this.loading = true;
            this.searched = true;

            try {
                const token = getCookie('linkstash_token');
                const params = new URLSearchParams({
                    q: this.query,
                    type: this.searchType,
                    page: this.page,
                    size: this.size,
                });
                const resp = await fetch('/api/search?' + params.toString(), {
                    headers: { 'Authorization': 'Bearer ' + token },
                });
                if (resp.ok) {
                    const data = await resp.json();
                    this.results = data.results || [];
                    this.total = data.total || 0;
                } else {
                    this.results = [];
                    this.total = 0;
                }
            } catch (e) {
                this.results = [];
                this.total = 0;
            }
            this.loading = false;
        },
    };
}

function getCookie(name) {
    const v = document.cookie.match('(^|;)\\s*' + name + '\\s*=\\s*([^;]+)');
    return v ? v.pop() : '';
}
</script>
{{end}}
