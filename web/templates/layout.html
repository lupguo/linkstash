{{define "layout"}}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinkStash // Terminal Mode</title>

    <!-- Google Fonts: JetBrains Mono -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'terminal-bg': '#0a0e17',
                        'terminal-green': '#00ff41',
                        'terminal-red': '#ff6b6b',
                        'terminal-cyan': '#4ecdc4',
                        'terminal-gray': '#888888',
                        'terminal-dark': '#0d1117',
                        'terminal-border': '#1a2332',
                    },
                    fontFamily: {
                        mono: ['"JetBrains Mono"', '"Fira Code"', 'monospace'],
                    },
                },
            },
        }
    </script>

    <!-- htmx -->
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>

    <!-- Alpine.js -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

    <style>
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
        .cursor-blink {
            animation: blink 1s step-end infinite;
        }
        .terminal-input {
            background: #0d1117;
            border: 1px solid #1a2332;
            color: #00ff41;
            caret-color: #00ff41;
        }
        .terminal-input:focus {
            border-color: #00ff41;
            outline: none;
            box-shadow: 0 0 0 1px #00ff41;
        }
        .terminal-input::placeholder {
            color: #555;
        }
        .terminal-card {
            background: #0d1117;
            border: 1px solid #1a2332;
            transition: border-color 0.2s;
        }
        .terminal-card:hover {
            border-color: #00ff41;
        }
        .terminal-btn {
            border: 1px solid #00ff41;
            color: #00ff41;
            background: transparent;
            transition: all 0.2s;
        }
        .terminal-btn:hover {
            background: #00ff41;
            color: #0a0e17;
        }
        .terminal-btn-danger {
            border-color: #ff6b6b;
            color: #ff6b6b;
        }
        .terminal-btn-danger:hover {
            background: #ff6b6b;
            color: #0a0e17;
        }
        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0a0e17; }
        ::-webkit-scrollbar-thumb { background: #1a2332; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #00ff41; }
    </style>
</head>
<body class="bg-terminal-bg text-terminal-green font-mono min-h-screen flex flex-col" x-data="{ authenticated: document.cookie.includes('linkstash_token') }">

    <!-- Navigation -->
    <nav class="border-b border-terminal-border px-4 py-3">
        <div class="max-w-7xl mx-auto flex items-center justify-between">
            <!-- Logo -->
            <a href="/" class="flex items-center space-x-2 text-lg font-bold hover:text-white transition-colors">
                <span class="text-terminal-gray">>&nbsp;_</span>
                <span class="cursor-blink">|</span>
                <span>LinkStash</span>
            </a>

            <!-- Nav Links -->
            <div class="hidden md:flex items-center space-x-6 text-sm">
                <a href="/" class="hover:text-white transition-colors">
                    <span class="text-terminal-gray">~/</span>urls
                </a>
                <a href="/search" class="hover:text-white transition-colors">
                    <span class="text-terminal-gray">~/</span>search
                </a>
                <a href="/short" class="hover:text-white transition-colors">
                    <span class="text-terminal-gray">~/</span>short-links
                </a>
            </div>

            <!-- Auth -->
            <div class="flex items-center space-x-4 text-sm">
                <template x-if="authenticated">
                    <button @click="document.cookie='linkstash_token=; path=/; max-age=0'; window.location.href='/login'"
                            class="text-terminal-red hover:text-red-400 transition-colors">
                        [logout]
                    </button>
                </template>
                <template x-if="!authenticated">
                    <a href="/login" class="text-terminal-cyan hover:text-cyan-300 transition-colors">
                        [login]
                    </a>
                </template>
            </div>

            <!-- Mobile Menu -->
            <div class="md:hidden" x-data="{ open: false }">
                <button @click="open = !open" class="text-terminal-green">
                    <span x-show="!open">[menu]</span>
                    <span x-show="open">[close]</span>
                </button>
                <div x-show="open" @click.away="open = false"
                     class="absolute right-4 top-14 bg-terminal-dark border border-terminal-border p-4 space-y-3 z-50">
                    <a href="/" class="block hover:text-white">~/urls</a>
                    <a href="/search" class="block hover:text-white">~/search</a>
                    <a href="/short" class="block hover:text-white">~/short-links</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-1 max-w-7xl mx-auto w-full px-4 py-6">
        {{template "content" .}}
    </main>

    <!-- Footer -->
    <footer class="border-t border-terminal-border px-4 py-4 text-center text-xs text-terminal-gray">
        <span>LinkStash v1.0 // Terminal Mode</span>
        <span class="mx-2">|</span>
        <span class="cursor-blink">_</span>
    </footer>

</body>
</html>
{{end}}
