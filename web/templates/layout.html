{{define "layout"}}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinkStash // Terminal Mode</title>

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <link rel="icon" type="image/png" sizes="32x32" href="/static/favicon-32.png">
    <link rel="apple-touch-icon" href="/static/apple-touch-icon.png">

    <!-- Local CSS (tree-shaken Tailwind + custom) -->
    <link rel="stylesheet" href="/static/css/app.css?v={{.Version}}">

    <!-- Bundled JS (htmx + Alpine + app components) -->
    <script src="/static/js/app.js?v={{.Version}}" defer></script>
    <meta name="htmx-config" content='{"historyCacheSize": 10}'>
</head>
<body class="bg-terminal-bg text-terminal-green font-mono min-h-screen flex flex-col"
      x-data="{ authenticated: document.cookie.includes('linkstash_token') }"
      hx-on::response-error="if(event.detail.xhr.status===401) window.location='/login'">

    <!-- Navigation — sticky + glass effect -->
    <nav class="nav-glass sticky top-0 z-40 border-b border-terminal-border px-4 py-3">
        <div class="max-w-7xl mx-auto flex items-center justify-between">
            <!-- Logo -->
            <a href="/" class="flex items-center space-x-2 text-lg font-bold hover:text-white transition-colors">
                <span class="text-terminal-gray">&gt;&nbsp;_</span>
                <span class="cursor-blink">|</span>
                <span>LinkStash</span>
            </a>

            <!-- Nav Links -->
            <div class="hidden md:flex items-center space-x-6 text-sm">
            </div>

            <!-- Auth -->
            <div class="flex items-center space-x-4 text-sm">
                <template x-if="authenticated">
                    <button @click="document.cookie='linkstash_token=; path=/; max-age=0'; window.location.href='/login'"
                            class="text-terminal-red hover:text-red-400 transition-colors">
                        [logout]
                    </button>
                </template>
                <template x-if="!authenticated">
                    <a href="/login" class="text-terminal-cyan hover:text-cyan-300 transition-colors">
                        [login]
                    </a>
                </template>
            </div>

            <!-- Mobile Menu -->
            <div class="md:hidden" x-data="{ open: false }">
                <button @click="open = !open" class="text-terminal-green">
                    <span x-show="!open">[menu]</span>
                    <span x-show="open">[close]</span>
                </button>
                <div x-show="open" @click.away="open = false"
                     class="absolute right-4 top-14 bg-terminal-dark border border-terminal-border p-4 space-y-3 z-50 rounded-lg">
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-1 max-w-7xl mx-auto w-full px-4 py-6">
        {{template "content" .}}
    </main>

    <!-- Footer -->
    <footer class="border-t border-terminal-border px-4 py-3 text-center text-xs text-terminal-gray">
        <div>
            <span>LinkStash {{.Version}} // Terminal Mode</span>
            <span class="mx-2">|</span>
            <span class="cursor-blink">_</span>
        </div>
        <div class="mt-1 text-terminal-gray/50">
            <a href="https://beian.miit.gov.cn/" target="_blank" rel="noopener noreferrer"
               class="hover:text-terminal-gray transition-colors">粤ICP备14088510号-6</a>
        </div>
    </footer>

</body>
</html>
{{end}}
