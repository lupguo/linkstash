{{define "color_picker"}}
<div class="flex gap-2 items-center flex-wrap">
    <button type="button" @click="form.color = ''"
            :class="form.color === '' ? 'ring-2 ring-white' : ''"
            class="w-6 h-6 rounded-full bg-terminal-dark border border-terminal-border cursor-pointer" title="none"></button>
    <button type="button" @click="form.color = 'green'"
            :class="form.color === 'green' ? 'ring-2 ring-white' : ''"
            class="w-6 h-6 rounded-full cursor-pointer" style="background:#00ff41" title="green"></button>
    <button type="button" @click="form.color = 'red'"
            :class="form.color === 'red' ? 'ring-2 ring-white' : ''"
            class="w-6 h-6 rounded-full cursor-pointer" style="background:#ff6b6b" title="red"></button>
    <button type="button" @click="form.color = 'cyan'"
            :class="form.color === 'cyan' ? 'ring-2 ring-white' : ''"
            class="w-6 h-6 rounded-full cursor-pointer" style="background:#4ecdc4" title="cyan"></button>
    <button type="button" @click="form.color = 'yellow'"
            :class="form.color === 'yellow' ? 'ring-2 ring-white' : ''"
            class="w-6 h-6 rounded-full cursor-pointer" style="background:#ffd93d" title="yellow"></button>
    <button type="button" @click="form.color = 'purple'"
            :class="form.color === 'purple' ? 'ring-2 ring-white' : ''"
            class="w-6 h-6 rounded-full cursor-pointer" style="background:#c084fc" title="purple"></button>
    <button type="button" @click="form.color = 'orange'"
            :class="form.color === 'orange' ? 'ring-2 ring-white' : ''"
            class="w-6 h-6 rounded-full cursor-pointer" style="background:#fb923c" title="orange"></button>
    <button type="button" @click="form.color = 'blue'"
            :class="form.color === 'blue' ? 'ring-2 ring-white' : ''"
            class="w-6 h-6 rounded-full cursor-pointer" style="background:#60a5fa" title="blue"></button>
</div>
{{end}}
