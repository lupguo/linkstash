{{define "status_badge"}}
{{if eq . "pending"}}
<span class="px-2 py-0.5 border badge-pending text-xs rounded">pending</span>
{{else if eq . "analyzing"}}
<span class="px-2 py-0.5 border badge-analyzing text-xs rounded">analyzing</span>
{{else if eq . "ready"}}
<span class="px-2 py-0.5 border badge-ready text-xs rounded">ready</span>
{{else if eq . "failed"}}
<span class="px-2 py-0.5 border badge-failed text-xs rounded">failed</span>
{{else}}
<span class="px-2 py-0.5 border border-terminal-gray text-terminal-gray text-xs rounded">{{.}}</span>
{{end}}
{{end}}
